name: Build & Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  GCP_PROJECT: merlin-wallet-prod
  GCP_REGION: europe-west1
  DOCKER_REGISTRY: europe-west1-docker.pkg.dev/merlin-wallet-prod/merlin-docker
  CLOUD_RUN_SERVICE: merlin-api
  FIREBASE_SITE: merlin-app

jobs:
  # ── Detect what changed ──────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # ── Backend: build + deploy to Cloud Run ─────────────────────────
  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & push Docker image
        run: |
          gcloud builds submit \
            --project ${{ env.GCP_PROJECT }} \
            --region ${{ env.GCP_REGION }} \
            --tag ${{ env.DOCKER_REGISTRY }}/merlin-api:${{ github.sha }} \
            backend/

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --project ${{ env.GCP_PROJECT }} \
            --region ${{ env.GCP_REGION }} \
            --image ${{ env.DOCKER_REGISTRY }}/merlin-api:${{ github.sha }} \
            --quiet

      - name: Verify health
        run: |
          URL=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --project ${{ env.GCP_PROJECT }} \
            --region ${{ env.GCP_REGION }} \
            --format='value(status.url)')
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$URL/api/v1/health")
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "Health check passed"

  # ── Frontend: build + deploy to Firebase Hosting ─────────────────
  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: frontend
        run: pnpm build

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ env.GCP_PROJECT }}
          target: ${{ env.FIREBASE_SITE }}
